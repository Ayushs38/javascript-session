<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="" id="new-form" onsubmit="displayData(event)">
        <label for="firstName">Enter First Name:</label>
        <input type="text" id="firstName" name="firstName">
        <br>
        <br>
        <label for="lastName">Enter Last Name:</label>
        <input type="text" id="lastName" name="lastName">
        <br>
        <br>
        <input type="submit">
    </form>
    <div>
        <h1>Profile</h1>
        <h3 >First Name is: <span id="firstname-display" style="color:red"></span></h3>
        <h3 >Last Name is: <span id="lastname-display" style="color:red"></span></h3>

    </div>

    <script>
        function displayData(event){
            event.preventDefault();
            let firstName = document.getElementById("firstName").value;
            let lastName = document.getElementById("lastName").value;
            // alert(firstName);
           document.getElementById("firstname-display").textContent = firstName;
           document.getElementById("lastname-display").textContent = lastName;

        }
        

    </script>
</body>
</html>
