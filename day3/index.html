<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="add"></h1>
    <h1 id="sub"></h1>
    <h1 id="division"></h1>
    <h1 id="multiplication"></h1>
    <h1 id="modulus"></h1>
  
    <script>
        let a = 3;
        let b = 7;

        let add = a + b; 
        let sub = b - a;
        let division = b/a;
        let mul = a*b;
        let modulus = b%a;
        // + - / * %
        document.getElementById("add").innerHTML = a+" + "+b+"" = add;
        document.getElementById("sub").innerHTML = "b - a = "+ sub;
        document.getElementById("division").innerHTML = "b / a = "+ division;
        document.getElementById("multiplication").innerHTML = "a * b = "+ mul;
        document.getElementById("modulus").innerHTML = "b % a = "+modulus;
        
    </script>
</body>
</html>
